name: ci

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: dotnet restore
        run: dotnet restore CryptikLemur.RimLogging.sln

      - name: dotnet build
        run: dotnet build CryptikLemur.RimLogging.sln -c Release --nologo --no-restore

      - name: dotnet test
        run: dotnet test CryptikLemur.RimLogging.sln -c Release --nologo --no-build --logger "console;verbosity=normal"
